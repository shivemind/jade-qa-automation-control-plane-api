type: http
name: Trigger an automation run for a given suite and environment
url: '{{baseUrl}}/test-runs'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "suiteId": "dfbf3653-ba3c-7182-0909-cd48463a3e22",
      "environment": "qa",
      "releaseVersion": "string",
      "triggeredBy": "string",
      "runMode": "smoke"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "runId": "72e900d0-4665-c3d8-3314-87271f00b175",
            "suiteId": "f4ef84de-41a0-2e08-b44a-c540e9b99c0d",
            "status": "running",
            "environment": "string",
            "releaseVersion": "string",
            "startedAt": "1949-05-12T12:49:16.716Z",
            "finishedAt": "1969-09-22T22:24:47.395Z",
            "passedCount": 9600,
            "failedCount": 8500,
            "flakyCount": 1549
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Test run started
