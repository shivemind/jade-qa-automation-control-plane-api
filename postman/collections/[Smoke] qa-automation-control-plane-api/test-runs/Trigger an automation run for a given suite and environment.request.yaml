type: http
name: Trigger an automation run for a given suite and environment
url: '{{baseUrl}}/test-runs'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "suiteId": "5b9eebe4-d644-bacd-214e-8cfebba773f7",
      "environment": "uat",
      "releaseVersion": "string",
      "triggeredBy": "string",
      "runMode": "regression"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "runId": "d7a28663-9914-70e8-9526-93336d6afb75",
            "suiteId": "49bf4d6f-423f-2cba-221b-23923bd46c77",
            "status": "running",
            "environment": "string",
            "releaseVersion": "string",
            "startedAt": "2025-07-29T13:25:32.621Z",
            "finishedAt": "1953-11-13T14:26:49.304Z",
            "passedCount": 3615,
            "failedCount": 2704,
            "flakyCount": 4952
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Test run started
