type: http
name: Trigger an automation run for a given suite and environment
url: '{{baseUrl}}/test-runs'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "suiteId": "d6c26923-bdf5-be9d-3d1e-cada7b2137d5",
      "environment": "dev",
      "releaseVersion": "string",
      "triggeredBy": "string",
      "runMode": "smoke"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "runId": "be5eb93d-d2f1-e87a-c493-8b9964658a2b",
            "suiteId": "a8b76415-463c-8cef-1054-bda16f811248",
            "status": "queued",
            "environment": "string",
            "releaseVersion": "string",
            "startedAt": "1963-09-17T22:55:39.374Z",
            "finishedAt": "2005-01-05T06:44:06.267Z",
            "passedCount": 9002,
            "failedCount": 7255,
            "flakyCount": 4198
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Test run started
