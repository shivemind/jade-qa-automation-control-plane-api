type: http
name: Get status and metrics for a test run
url: '{{baseUrl}}/test-runs/:runId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: runId
    value: 6d8bbffc-9089-1a3b-0635-3f1f149ad5ad
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "runId": "86e9a8ee-bf2b-42ed-9dda-f1fb36bf44b5",
            "suiteId": "275e1006-3dc2-aeae-e0e0-8c09b9178f1c",
            "status": "cancelled",
            "environment": "string",
            "releaseVersion": "string",
            "startedAt": "1962-06-19T00:09:59.794Z",
            "finishedAt": "2021-08-01T10:22:30.643Z",
            "passedCount": 8775,
            "failedCount": 1953,
            "flakyCount": 6169
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Test run details
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 3817
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Test run not found
