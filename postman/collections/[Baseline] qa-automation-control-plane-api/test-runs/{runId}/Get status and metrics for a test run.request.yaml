type: http
name: Get status and metrics for a test run
url: '{{baseUrl}}/test-runs/:runId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: runId
    value: b6b49976-f75c-2b28-6e9a-ac627d0d5f7d
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "runId": "f861a5cd-3ef8-6d12-0856-112026b267fd",
            "suiteId": "9b705604-4b6d-6148-fec7-4b5e379c8bcd",
            "status": "passed",
            "environment": "string",
            "releaseVersion": "string",
            "startedAt": "2010-10-21T18:08:37.927Z",
            "finishedAt": "1988-09-12T07:16:46.686Z",
            "passedCount": 8740,
            "failedCount": 7503,
            "flakyCount": 8715
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Test run details
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 3193
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Test run not found
