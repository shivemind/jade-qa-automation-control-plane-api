type: http
name: Get status and metrics for a test run
url: '{{baseUrl}}/test-runs/:runId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: runId
    value: 092143a5-aed2-20db-65ea-c021a14e9d2e
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "runId": "4bb9ef98-31e1-d20a-af52-56b51f19b4ea",
            "suiteId": "639127d9-0f9b-98b4-a9b6-60b0b67c6a88",
            "status": "failed",
            "environment": "string",
            "releaseVersion": "string",
            "startedAt": "2003-05-23T21:43:27.665Z",
            "finishedAt": "1958-06-23T13:25:28.542Z",
            "passedCount": 4430,
            "failedCount": 9742,
            "flakyCount": 2904
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Test run details
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 2398
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Test run not found
