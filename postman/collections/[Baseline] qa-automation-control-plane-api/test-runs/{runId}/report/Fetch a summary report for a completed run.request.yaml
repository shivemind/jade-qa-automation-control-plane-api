type: http
name: Fetch a summary report for a completed run
url: '{{baseUrl}}/test-runs/:runId/report'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: runId
    value: 6d8bbffc-9089-1a3b-0635-3f1f149ad5ad
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "runId": "5ca7ab12-9bb2-6b09-d319-a861f5d27ec8",
            "qualityGate": "fail",
            "defectLeakageRisk": "high",
            "summary": "string",
            "topFailures": [
              {
                "testName": "string",
                "failureReason": "string",
                "defectId": "string"
              },
              {
                "testName": "string",
                "failureReason": "string",
                "defectId": "string"
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Run report
