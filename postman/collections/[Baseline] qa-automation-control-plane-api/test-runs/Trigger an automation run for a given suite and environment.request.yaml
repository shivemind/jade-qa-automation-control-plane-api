type: http
name: Trigger an automation run for a given suite and environment
url: '{{baseUrl}}/test-runs'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "suiteId": "884fc8cd-936e-dc44-ec25-c82fd74703a5",
      "environment": "dev",
      "releaseVersion": "string",
      "triggeredBy": "string",
      "runMode": "regression"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "runId": "4bb9ef98-31e1-d20a-af52-56b51f19b4ea",
            "suiteId": "639127d9-0f9b-98b4-a9b6-60b0b67c6a88",
            "status": "failed",
            "environment": "string",
            "releaseVersion": "string",
            "startedAt": "2003-05-23T21:43:27.665Z",
            "finishedAt": "1958-06-23T13:25:28.542Z",
            "passedCount": 4430,
            "failedCount": 9742,
            "flakyCount": 2904
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Test run started
